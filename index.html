<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i-NoCarbon — Redirecting...</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #1B5E20;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; }
    .box { background: white; border-radius: 12px; padding: 32px 40px;
           text-align: center; max-width: 400px; }
    .logo { font-size: 28px; font-weight: 800; color: #1B5E20; margin-bottom: 8px; }
    .sub  { font-size: 14px; color: #666; margin-bottom: 20px; }
    .btn  { display: inline-block; background: #1B5E20; color: white;
            padding: 12px 28px; border-radius: 8px; text-decoration: none;
            font-weight: 700; font-size: 15px; margin-top: 8px; }
    .note { font-size: 11px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">🌿 i-NoCarbon</div>
    <div class="sub">Free carbon calculator for households &amp; businesses</div>
    <p style="font-size:13px;color:#444">Taking you to the calculator...</p>
    <a id="go-btn" class="btn" href="#">Open Calculator →</a>
    <div class="note">If you are not redirected automatically, click the button above.</div>
  </div>

  <script>
    // ── UPDATE THIS LINE ONLY before each demo session ──────────────────────
    const DEMO_URL = "https://quick-exhaust-href-offline.trycloudflare.com";
    // ────────────────────────────────────────────────────────────────────────

    document.getElementById('go-btn').href = DEMO_URL;
    window.location.replace(DEMO_URL);
  </script>
</body>
</html>
